# claude-tmux-hooks: window status format with Claude state indicators
#
# Add to your ~/.tmux.conf:
#   source-file /path/to/claude-tmux-hooks/tmux/claude-state.conf
#
# Or after installing:
#   source-file ~/.claude/tmux/claude-state.conf
#
# Requires tmux >= 3.0 (for #{==:} conditionals).
#
# States:
#   running  ●○ teal bold   Claude is working (tool use in progress)
#   input    ? amber       Claude is waiting for your response
#   permission ! red bold  Claude needs approval to run a command
#   done     ✓ green       Claude finished (no question asked)
#   (empty)    dim         Idle / no active Claude session
#
# Colors use named terminal palette — adapt to your theme by replacing
# cyan/yellow/red/green with #[fg=colour14] etc.

setw -g window-status-format \
  "#{?#{==:#{@claude-state},running},#[fg=cyan]#[bold]#{@claude-spinner} ,\
#{?#{==:#{@claude-state},input},#[fg=yellow]#[nobold]? ,\
#{?#{==:#{@claude-state},permission},#[fg=red]#[bold]! ,\
#{?#{==:#{@claude-state},done},#[fg=green]#[nobold]✓ ,\
 }}}}#[default] #I #W#F "

setw -g window-status-current-format \
  "#{?#{==:#{@claude-state},running},#[fg=cyan]#[bold]#{@claude-spinner} ,\
#{?#{==:#{@claude-state},input},#[fg=yellow]#[nobold]? ,\
#{?#{==:#{@claude-state},permission},#[fg=red]#[bold]! ,\
#{?#{==:#{@claude-state},done},#[fg=green]#[nobold]✓ ,\
 }}}}#[default]#[bold] #I #W#F "
